name: 매일 환율 알림

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 오전 9시 (한국시간 = UTC 0시)
  workflow_dispatch:       # 수동 실행 버튼

jobs:
  exchange-rate:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v3

      - name: Python 설치
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: 라이브러리 설치
        run: pip install requests

      - name: 환율 알림 발송
        run: python exchange_rate.py
