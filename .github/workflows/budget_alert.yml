name: 예산 초과 알림

on:
  schedule:
    - cron: '0 12 * * *'  # 매일 오후 9시 (한국시간 = UTC 12시)
  workflow_dispatch:        # 수동 실행 버튼

jobs:
  check-budget:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v3

      - name: Python 설치
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: 라이브러리 설치
        run: pip install requests pandas supabase

      - name: 예산 알림 실행
        env:
          KAKAO_ACCESS_TOKEN: ${{ secrets.KAKAO_ACCESS_TOKEN }}
          KAKAO_ACCESS_TOKEN_HUSBAND: ${{ secrets.KAKAO_ACCESS_TOKEN_HUSBAND }}
        run: python budget_alert.py
