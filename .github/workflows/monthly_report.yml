name: 월간 리포트

on:
  schedule:
    - cron: '0 15 28-31 * *'  # 매월 28~31일 오전 0시 (한국시간 = UTC 15시)
  workflow_dispatch:            # 수동 실행 버튼

jobs:
  monthly-report:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v3

      - name: Python 설치
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: 라이브러리 설치
        run: pip install requests pandas supabase

      - name: 월말인지 확인 후 발송
        env:
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          KAKAO_REFRESH_TOKEN_HUSBAND: ${{ secrets.KAKAO_REFRESH_TOKEN_HUSBAND }}
        run: |
          python3 -c "
          from datetime import datetime, timedelta
          today = datetime.today()
          tomorrow = today + timedelta(days=1)
          if tomorrow.month != today.month:
              import subprocess
              subprocess.run(['python3', 'monthly_report.py'], check=True)
          else:
              print('오늘은 월말이 아님, 스킵')
          "
